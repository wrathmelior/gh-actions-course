name: 01 - Building Blocks

on: workflow_dispatch

jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps: 
        - name: Say Hello
          run: echo "Hello World"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
        - name: Successful step
          run: |
            echo "I will Succeed"
            exit 0
        - name: Say Goodbye 
          run: echo "Goodbye!"
  echo-fail:
    runs-on: ubuntu-latest
    steps:
      - name: fail step
        run: |
          echo "I will fail"
          exit 1
      
